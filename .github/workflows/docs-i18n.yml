name: docs-i18n

# Bilingual-docs gate via the shared Mcp.I18nCheck tool (repo mcp-tooling).
# English is canonical; every English doc must have its Russian counterpart.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bilingual-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet tool restore
      - run: dotnet tool run mcp-i18ncheck
