name: dotnet-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Don't run multiple tests on rapid pushes — cancel the in-flight one.
concurrency:
  group: dotnet-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore StaticBitXrplMcp.sln

      - name: Build
        run: dotnet build StaticBitXrplMcp.sln --no-restore --configuration Release

      - name: Unit tests
        run: dotnet test StaticBitXrplMcp.sln --no-build --configuration Release --filter "FullyQualifiedName~TestU" --logger "console;verbosity=normal"
