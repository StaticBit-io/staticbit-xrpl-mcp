name: docker

# Manual ad-hoc publish of the cloud-server image via the shared reusable
# build+push workflow (repo mcp-tooling). The normal path is automatic: an
# xrpl-cloud release builds the image as a job inside release-plugin.yml.
# Use this only to republish an image without cutting a plugin release.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (without leading v, e.g. 0.1.0). Used as the image tag.'
        required: true
        type: string

jobs:
  build-push:
    permissions:
      contents: read
      packages: write
    uses: Platonenkov/mcp-tooling/.github/workflows/docker-build-push.yml@main
    with:
      version: ${{ inputs.version }}
      images: |
        [
          { "name": "staticbit-xrpl-mcp", "image_suffix": "staticbit-xrpl-mcp",
            "dockerfile": "./Dockerfile", "context": ".", "cache_scope": "staticbit-xrpl-mcp" }
        ]
