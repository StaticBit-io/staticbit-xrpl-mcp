name: docker

# Thin caller of the shared reusable build+push workflow (repo mcp-tooling).
# Publishes the cloud-server image to ghcr.io on a vX.Y.Z tag or manual dispatch.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (without leading v, e.g. 0.1.0). Used as the image tag.'
        required: true
        type: string

jobs:
  build-push:
    permissions:
      contents: read
      packages: write
    uses: Platonenkov/mcp-tooling/.github/workflows/docker-build-push.yml@main
    with:
      version: ${{ github.event.inputs.version || github.ref_name }}
      images: |
        [
          { "name": "staticbit-xrpl-mcp", "image_suffix": "staticbit-xrpl-mcp",
            "dockerfile": "./Dockerfile", "context": ".", "cache_scope": "staticbit-xrpl-mcp" }
        ]
