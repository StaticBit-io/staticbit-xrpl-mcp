name: fleet-lint

# Cross-repo consistency gate via the shared `Mcp.FleetLint` dotnet tool. Thin caller of the
# reusable workflow in `mcp-tooling`. Validates this repo's OAuth scope, /mcp endpoint host,
# OAuth callback port, and AS hostname references against the canonical fleet inventory at
# https://raw.githubusercontent.com/Platonenkov/mcp-tooling/main/fleet-lint.json

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  fleetlint:
    uses: Platonenkov/mcp-tooling/.github/workflows/fleet-lint.yml@main
